version: '3.9'

services:
  mongodb:
    image: mongo:7.0
    container_name: uma-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: universal_media_archive
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: uma-backend
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://mongodb:27017/
      DB_NAME: universal_media_archive
      FLASK_ENV: production
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: gunicorn -w 2 -b 0.0.0.0:5000 app:app

  frontend:
    image: nginx:alpine
    container_name: uma-frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  mongo-data:
